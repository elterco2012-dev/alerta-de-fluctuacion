<!DOCTYPE html>
<!-- @dsCard group="Components" name="Risk & type badges" subtitle="Squared risk badges + the one categorical (purple) badge" viewport="700x210" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="lbl">Risk badges — squared (radius 4px)</div>
  <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
    <span class="bdg bdg-critico">Crítico</span>
    <span class="bdg bdg-alto">Alto</span>
    <span class="bdg bdg-medio">Medio</span>
    <span class="bdg bdg-bajo">Bajo</span>
    <span class="bdg bdg-critico">rot alta</span>
    <span class="bdg bdg-medio">rot media</span>
    <span class="bdg bdg-bajo">rot baja</span>
  </div>
  <div class="lbl" style="margin-top:20px;">Categorical badge — intervention type (the one non-risk color)</div>
  <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
    <span class="bdg bdg-tipo">Reunión 1:1</span>
    <span class="bdg bdg-tipo">Acompañamiento</span>
    <span class="bdg bdg-tipo">Capacitación</span>
    <span class="bdg bdg-tipo">Ajuste de cartera</span>
  </div>
  <div style="margin-top:16px;font:400 12px var(--font-sans);color:var(--ink-500);">Same color logic as score circles; squared corners distinguish badges from pills.</div>
</div></body></html>
