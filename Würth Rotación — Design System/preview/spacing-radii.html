<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Corner radii" subtitle="12 / 10 / 4px, 50% circle, 2px bar top" viewport="700x170" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="row" style="gap:18px;align-items:flex-end;">
    <div class="col" style="align-items:center;gap:8px;"><div style="width:72px;height:56px;background:#fff;box-shadow:var(--shadow-card);border-radius:12px;"></div><div class="nm">12px</div><div class="hex">card</div></div>
    <div class="col" style="align-items:center;gap:8px;"><div style="width:72px;height:56px;background:#fff;box-shadow:var(--shadow-card);border-radius:10px;"></div><div class="nm">10px</div><div class="hex">small card · pill</div></div>
    <div class="col" style="align-items:center;gap:8px;"><div style="width:72px;height:56px;background:#fff;box-shadow:var(--shadow-card);border-radius:4px;"></div><div class="nm">4px</div><div class="hex">badge</div></div>
    <div class="col" style="align-items:center;gap:8px;"><div style="width:56px;height:56px;background:var(--red-bg);border:2px solid var(--red-accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font:800 20px var(--font-sans);color:var(--red-text);">8</div><div class="nm">50%</div><div class="hex">score circle</div></div>
    <div class="col" style="align-items:center;gap:8px;"><div style="width:24px;height:40px;background:var(--orange-accent);border-radius:2px 2px 0 0;"></div><div class="nm">2px top</div><div class="hex">spark bar</div></div>
  </div>
</div></body></html>
