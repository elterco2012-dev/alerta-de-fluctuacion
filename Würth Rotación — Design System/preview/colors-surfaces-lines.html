<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Surfaces & lines" subtitle="Card / header / hover surfaces and the three divider weights" viewport="700x220" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="row" style="gap:10px;align-items:stretch;">
    <div class="sw" style="flex:1;">
      <div class="chip chip-bordered" style="background:var(--surface);height:54px;box-shadow:var(--shadow-card);"></div>
      <div class="nm">Surface / card</div><div class="hex">#fff</div>
    </div>
    <div class="sw" style="flex:1;">
      <div class="chip chip-bordered" style="background:var(--table-head-bg);height:54px;"></div>
      <div class="nm">Table header</div><div class="hex">#f8f9fa</div>
    </div>
    <div class="sw" style="flex:1;">
      <div class="chip chip-bordered" style="background:var(--row-hover);height:54px;"></div>
      <div class="nm">Row hover</div><div class="hex">#fafafa</div>
    </div>
  </div>
  <div style="margin-top:18px;display:flex;flex-direction:column;gap:12px;">
    <div style="display:flex;align-items:center;gap:12px;"><div style="flex:1;border-bottom:2px solid var(--line-strong);"></div><div class="hex" style="white-space:nowrap;">2px #e9ecef — th underline</div></div>
    <div style="display:flex;align-items:center;gap:12px;"><div style="flex:1;border-bottom:1px solid var(--line);"></div><div class="hex" style="white-space:nowrap;">1px #eee — nav / section divider</div></div>
    <div style="display:flex;align-items:center;gap:12px;"><div style="flex:1;border-bottom:1px solid var(--line-faint);"></div><div class="hex" style="white-space:nowrap;">1px #f2f2f2 — row separator</div></div>
  </div>
</div></body></html>
