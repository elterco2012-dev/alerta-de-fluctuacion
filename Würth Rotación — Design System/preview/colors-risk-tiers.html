<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Risk tier palette" subtitle="The four-tier risk system — each tier an accent/bg/text triad" viewport="700x240" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="row" style="gap:10px;">
    <div class="sw" style="flex:1;">
      <div class="chip" style="background:var(--red-accent);"></div>
      <div class="nm">Crítico 🔴</div>
      <div class="hex">#E24B4A · accent</div>
      <div style="display:flex;gap:6px;">
        <div style="flex:1;height:22px;border-radius:5px;background:var(--red-bg);"></div>
        <div style="flex:1;height:22px;border-radius:5px;background:var(--red-text);"></div>
      </div>
      <div class="hex">#FDECEA bg · #B71C1C text</div>
    </div>
    <div class="sw" style="flex:1;">
      <div class="chip" style="background:var(--orange-accent);"></div>
      <div class="nm">Alto 🟠</div>
      <div class="hex">#EF9F27 · accent</div>
      <div style="display:flex;gap:6px;">
        <div style="flex:1;height:22px;border-radius:5px;background:var(--orange-bg);"></div>
        <div style="flex:1;height:22px;border-radius:5px;background:var(--orange-text);"></div>
      </div>
      <div class="hex">#FFF3E0 bg · #E65100 text</div>
    </div>
    <div class="sw" style="flex:1;">
      <div class="chip" style="background:var(--blue-accent);"></div>
      <div class="nm">Medio · Info 🔵</div>
      <div class="hex">#4A90D9 · accent + links</div>
      <div style="display:flex;gap:6px;">
        <div style="flex:1;height:22px;border-radius:5px;background:var(--blue-bg);"></div>
        <div style="flex:1;height:22px;border-radius:5px;background:var(--blue-text);"></div>
      </div>
      <div class="hex">#E3F2FD bg · #1565C0 text</div>
    </div>
    <div class="sw" style="flex:1;">
      <div class="chip" style="background:var(--green-accent);"></div>
      <div class="nm">Bajo 🟢</div>
      <div class="hex">#639922 · accent</div>
      <div style="display:flex;gap:6px;">
        <div style="flex:1;height:22px;border-radius:5px;background:var(--green-bg);"></div>
        <div style="flex:1;height:22px;border-radius:5px;background:var(--green-text);"></div>
      </div>
      <div class="hex">#F1F8E9 bg · #2E7D32 text</div>
    </div>
  </div>
</div></body></html>
