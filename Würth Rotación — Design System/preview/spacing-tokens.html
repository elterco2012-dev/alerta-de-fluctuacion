<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing tokens" subtitle="KPI gap, card padding, page gutter, 4px accent border" viewport="700x230" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="col" style="gap:14px;">
    <div style="display:flex;align-items:center;gap:14px;"><div style="width:64px;height:14px;background:var(--blue-accent);border-radius:3px;"></div><div class="hex">14px — KPI row gap</div></div>
    <div style="display:flex;align-items:center;gap:14px;"><div style="width:20px;height:46px;background:var(--ink-200);border-radius:3px;"></div><div class="hex">20px — card padding</div></div>
    <div style="display:flex;align-items:center;gap:14px;"><div style="width:40px;height:46px;background:var(--ink-200);border-radius:3px;"></div><div class="hex">2.5rem (40px) — page gutter</div></div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:64px;height:40px;background:#fff;border-left:4px solid var(--red-accent);box-shadow:var(--shadow-card);border-radius:0 8px 8px 0;"></div>
      <div class="hex">4px — signature risk-colored left-border</div>
    </div>
  </div>
</div></body></html>
