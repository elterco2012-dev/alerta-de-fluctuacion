<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Supporting colors" subtitle="Purple tipo badge, yellow pill, chart neutral, cell tints" viewport="700x220" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="row" style="gap:10px;">
    <div class="sw" style="flex:1;">
      <div style="display:flex;gap:6px;"><div style="flex:1;height:38px;border-radius:6px;background:var(--purple-bg);"></div><div style="flex:1;height:38px;border-radius:6px;background:var(--purple-text);"></div></div>
      <div class="nm">Tipo badge (purple)</div>
      <div class="hex">#F3E8FF · #6B21A8</div>
    </div>
    <div class="sw" style="flex:1;">
      <div style="display:flex;gap:6px;"><div style="flex:1;height:38px;border-radius:6px;background:var(--yellow-bg);border:1px solid rgba(0,0,0,.06);"></div><div style="flex:1;height:38px;border-radius:6px;background:var(--yellow-text);"></div></div>
      <div class="nm">Yellow pill</div>
      <div class="hex">#FFFDE7 · #F57F17</div>
    </div>
    <div class="sw" style="flex:1;">
      <div class="chip chip-bordered" style="background:var(--chart-neutral);"></div>
      <div class="nm">Chart neutral</div>
      <div class="hex">#B4B2A9 — stable bars</div>
    </div>
  </div>
  <div class="row" style="gap:10px;margin-top:14px;">
    <div class="sw" style="flex:1;">
      <div style="display:flex;gap:6px;"><div style="flex:1;height:30px;border-radius:6px;background:var(--green-pos-bg);"></div><div style="flex:1;height:30px;border-radius:6px;background:var(--green-pos-tx);"></div></div>
      <div class="hex">cell ≥70% · #D4EDDA / #155724</div>
    </div>
    <div class="sw" style="flex:1;">
      <div style="display:flex;gap:6px;"><div style="flex:1;height:30px;border-radius:6px;background:var(--cell-warn-bg);"></div><div style="flex:1;height:30px;border-radius:6px;background:var(--cell-warn-tx);"></div></div>
      <div class="hex">cell warn · #FFF3CD / #856404</div>
    </div>
    <div class="sw" style="flex:1;">
      <div style="display:flex;gap:6px;"><div style="flex:1;height:30px;border-radius:6px;background:var(--cell-bad-bg);"></div><div style="flex:1;height:30px;border-radius:6px;background:var(--cell-bad-tx);"></div></div>
      <div class="hex">cell bad · #FFE0E0 / #C0392B</div>
    </div>
  </div>
</div></body></html>
