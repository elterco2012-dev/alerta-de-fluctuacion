<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Ink ladder" subtitle="9-step neutral gray scale (#1a1a2e → #ccc)" viewport="700x170" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="row" style="gap:0;">
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-900);"></div><div class="hex">#1a1a2e</div></div>
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-700);"></div><div class="hex">#333</div></div>
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-600);"></div><div class="hex">#555</div></div>
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-500);"></div><div class="hex">#666</div></div>
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-400);"></div><div class="hex">#888</div></div>
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-300);"></div><div class="hex">#999</div></div>
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-250);"></div><div class="hex">#aaa</div></div>
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-200);"></div><div class="hex">#bbb</div></div>
    <div class="sw" style="flex:1;"><div class="chip chip-bordered" style="background:var(--ink-150);"></div><div class="hex">#ccc</div></div>
  </div>
  <div style="margin-top:14px;font:var(--w-regular) 12px var(--font-sans);color:var(--ink-500);">
    9-step ink ladder — headings → placeholders. No pure black; <b style="color:var(--ink-900);">#1a1a2e</b> is the darkest text.
  </div>
</div></body></html>
