<!DOCTYPE html>
<!-- @dsCard group="Components" name="KPI cards" subtitle="Left-accent-border KPI cards color-coded by risk" viewport="700x150" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="row" style="gap:14px;">
    <div class="kpi-card" style="flex:1;">
      <div class="kpi-value">47</div>
      <div class="kpi-label">Vendedores activos</div>
      <div class="kpi-sub">Actualizando mensualmente</div>
    </div>
    <div class="kpi-card kc" style="flex:1;">
      <div class="kpi-value" style="color:var(--red-accent);">12</div>
      <div class="kpi-label">En riesgo elevado</div>
      <div class="kpi-sub">Score ≥ 6 (alto o crítico)</div>
    </div>
    <div class="kpi-card ka" style="flex:1;">
      <div class="kpi-value">5,2 m</div>
      <div class="kpi-label">Permanencia al egreso</div>
      <div class="kpi-sub">Últimos 12 meses</div>
    </div>
    <div class="kpi-card ki" style="flex:1;">
      <div class="kpi-value" style="color:var(--blue-accent);">8</div>
      <div class="kpi-label">Onboarding en riesgo</div>
      <div class="kpi-sub">Primeros 6 meses</div>
    </div>
  </div>
</div></body></html>
