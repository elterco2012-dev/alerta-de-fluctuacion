<!DOCTYPE html>
<!-- @dsCard group="Components" name="Intervention impact" subtitle="Effectiveness bars + impact value treatment" viewport="700x260" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="lbl">Impacto en score — intervention effectiveness bars</div>
  <div class="card" style="margin-top:12px;padding:14px 18px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <span class="bdg bdg-tipo" style="width:130px;">Reunión 1:1</span>
      <div style="width:80px;height:8px;background:var(--green-accent);border-radius:4px;"></div>
      <span style="color:var(--green-text);font-weight:700;font-size:13px;">+1.8</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <span class="bdg bdg-tipo" style="width:130px;">Acompañamiento</span>
      <div style="width:48px;height:8px;background:var(--green-accent);border-radius:4px;"></div>
      <span style="color:var(--green-text);font-weight:700;font-size:13px;">+1.1</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="bdg bdg-tipo" style="width:130px;">Capacitación</span>
      <div style="width:22px;height:8px;background:var(--red-accent);border-radius:4px;"></div>
      <span style="color:var(--red-text);font-weight:700;font-size:13px;">−0.5</span>
    </div>
  </div>
  <div style="margin-top:14px;display:flex;gap:18px;">
    <span class="imp" style="color:var(--green-text);font-weight:700;font-size:14px;">↓ 1.8 mejora</span>
    <span style="color:var(--ink-400);font-size:13px;">= sin cambio</span>
    <span style="color:var(--red-text);font-weight:700;font-size:14px;">↑ 0.5 empeora</span>
  </div>
</div></body></html>
