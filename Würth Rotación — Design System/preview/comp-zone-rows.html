<!DOCTYPE html>
<!-- @dsCard group="Components" name="Zone list rows" subtitle="High-rotation zone rows inside a card" viewport="700x200" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="wrap">
  <div class="card" style="padding:4px 20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line-faint);">
      <div><div style="font-weight:700;font-size:13px;color:var(--ink-900);">Centro · Rodríguez, A.</div><div style="font-size:11px;color:var(--ink-250);margin-top:2px;">23 vendedores históricos · duración prom. al egreso: 4,1m</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;"><div style="font-weight:700;font-size:13px;">64% plan</div><span class="bdg bdg-critico">Crítico</span></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line-faint);">
      <div><div style="font-weight:700;font-size:13px;color:var(--ink-900);">Norte · Díaz, M.</div><div style="font-size:11px;color:var(--ink-250);margin-top:2px;">18 vendedores históricos · duración prom. al egreso: 6,8m</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;"><div style="font-weight:700;font-size:13px;">81% plan</div><span class="bdg bdg-medio">Medio</span></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 0;">
      <div><div style="font-weight:700;font-size:13px;color:var(--ink-900);">Sur · Fernández, J.</div><div style="font-size:11px;color:var(--ink-250);margin-top:2px;">11 vendedores históricos · duración prom. al egreso: 12,4m</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;"><div style="font-weight:700;font-size:13px;">96% plan</div><span class="bdg bdg-bajo">Bajo</span></div>
    </div>
  </div>
</div></body></html>
